<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>电脑监控系统</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; padding: 20px; background: #f5f5f5; }
        .container { max-width: 600px; margin: 0 auto; }
        h1 { text-align: center; margin-bottom: 20px; color: #333; }
        .device-card { background: white; border-radius: 12px; padding: 20px; margin-bottom: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .device-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .device-name { font-size: 18px; font-weight: bold; }
        .status { padding: 4px 12px; border-radius: 12px; font-size: 12px; }
        .online { background: #4CAF50; color: white; }
        .offline { background: #ccc; color: white; }
        .device-info { color: #666; font-size: 14px; margin-bottom: 15px; }
        .controls { display: flex; gap: 10px; flex-wrap: wrap; }
        button { padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; transition: all 0.3s; }
        .btn-danger { background: #f44336; color: white; }
        .btn-warning { background: #ff9800; color: white; }
        .btn-primary { background: #2196F3; color: white; }
        button:hover { opacity: 0.8; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        .time-input { display: flex; gap: 10px; align-items: center; margin-top: 10px; }
        input { padding: 8px; border: 1px solid #ddd; border-radius: 4px; width: 80px; }
        select { padding: 8px; border: 1px solid #ddd; border-radius: 4px; }
        .login-card { background: white; border-radius: 12px; padding: 30px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .login-card h2 { text-align: center; margin-bottom: 20px; color: #333; }
        .login-card input[type="password"] { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; margin-bottom: 15px; font-size: 16px; }
        .login-card button { width: 100%; padding: 12px; background: #2196F3; color: white; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; }
        .login-card button:hover { opacity: 0.9; }
        .error { color: #f44336; text-align: center; margin-top: 10px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .logout-btn { background: #ccc; color: #333; padding: 8px 16px; border-radius: 8px; border: none; cursor: pointer; font-size: 14px; }
    </style>
</head>
<body>
    <div class="container">
        <div id="login-page" style="display: none;">
            <div class="login-card">
                <h2>电脑监控系统</h2>
                <input type="password" id="password" placeholder="请输入密码" onkeypress="if(event.key==='Enter')login()">
                <button onclick="login()">登录</button>
                <p class="error" id="login-error"></p>
            </div>
        </div>
        <div id="main-page" style="display: none;">
            <div class="header">
                <h1>电脑监控系统</h1>
                <button class="logout-btn" onclick="logout()">退出</button>
            </div>
            <div id="devices"></div>
        </div>
    </div>

    <script>
        const API_URL = window.location.origin;
        let devices = {};
        let token = localStorage.getItem('token');
        let timeValues = {};

        async function checkAuth() {
            if (!token) {
                showLogin();
                return;
            }
            try {
                const res = await fetch(`${API_URL}/api/check-auth`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (res.ok) {
                    showMain();
                    loadDevices();
                } else {
                    localStorage.removeItem('token');
                    token = null;
                    showLogin();
                }
            } catch (e) {
                showLogin();
            }
        }

        function showLogin() {
            document.getElementById('login-page').style.display = 'block';
            document.getElementById('main-page').style.display = 'none';
        }

        function showMain() {
            document.getElementById('login-page').style.display = 'none';
            document.getElementById('main-page').style.display = 'block';
        }

        async function login() {
            const password = document.getElementById('password').value;
            const errorEl = document.getElementById('login-error');
            errorEl.textContent = '';
            
            try {
                const res = await fetch(`${API_URL}/api/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password })
                });
                const data = await res.json();
                if (res.ok) {
                    token = data.token;
                    localStorage.setItem('token', token);
                    showMain();
                    loadDevices();
                } else {
                    errorEl.textContent = data.error || '登录失败';
                }
            } catch (e) {
                errorEl.textContent = '连接服务器失败';
            }
        }

        function logout() {
            fetch(`${API_URL}/api/logout`, {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${token}` }
            }).catch(() => {});
            localStorage.removeItem('token');
            token = null;
            showLogin();
        }

        async function loadDevices() {
            try {
                const res = await fetch(`${API_URL}/api/devices`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (res.status === 401) {
                    localStorage.removeItem('token');
                    token = null;
                    showLogin();
                    return;
                }
                devices = await res.json();
                renderDevices();
            } catch (e) {
                console.error('Failed to load devices:', e);
            }
        }

        function renderDevices() {
            const container = document.getElementById('devices');
            
            if (Object.keys(devices).length === 0) {
                container.innerHTML = '<div class="device-card"><p style="text-align:center;color:#999;">暂无在线设备</p></div>';
                return;
            }

            container.innerHTML = Object.entries(devices).map(([id, device]) => `
                <div class="device-card">
                    <div class="device-header">
                        <span class="device-name">${device.hostname || id}</span>
                        <span class="status online">在线</span>
                    </div>
                    <div class="device-info">
                        系统: ${device.os || '未知'} | ID: ${id}
                    </div>
                    <div class="controls">
                        <button class="btn-danger" onclick="shutdown('${id}')">立即关机</button>
                        <button class="btn-warning" onclick="scheduleShutdown('${id}')">定时关机</button>
                    </div>
                    <div class="time-input">
                        <input type="number" id="time-${id}" value="${timeValues[id] || 30}" min="1" max="1440">
                        <span>分钟后关机</span>
                    </div>
                </div>
            `).join('');

            Object.keys(devices).forEach(id => {
                const input = document.getElementById(`time-${id}`);
                if (input) {
                    input.addEventListener('input', () => {
                        timeValues[id] = input.value;
                    });
                }
            });
        }

        async function shutdown(deviceId) {
            if (!confirm('确定要立即关机吗？')) return;
            
            try {
                const res = await fetch(`${API_URL}/api/device/${deviceId}/command`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                    body: JSON.stringify({ command: 'shutdown', params: {} })
                });
                if (res.status === 401) {
                    localStorage.removeItem('token');
                    token = null;
                    showLogin();
                    return;
                }
                alert('关机指令已发送');
            } catch (e) {
                alert('发送失败: ' + e.message);
            }
        }

        async function scheduleShutdown(deviceId) {
            const timeInput = document.getElementById(`time-${deviceId}`);
            const minutes = parseInt(timeInput.value) || 30;
            const seconds = minutes * 60;
            
            try {
                const res = await fetch(`${API_URL}/api/device/${deviceId}/command`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                    body: JSON.stringify({ command: 'schedule_shutdown', params: { seconds } })
                });
                if (res.status === 401) {
                    localStorage.removeItem('token');
                    token = null;
                    showLogin();
                    return;
                }
                alert(`将在 ${minutes} 分钟后关机`);
            } catch (e) {
                alert('发送失败: ' + e.message);
            }
        }

        checkAuth();
        setInterval(() => {
            if (token) loadDevices();
        }, 5000);
    </script>
</body>
</html>
